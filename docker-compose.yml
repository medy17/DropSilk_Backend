services:
  postgres:
    image: postgres:16-alpine
    container_name: dropsilk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dropsilk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dropsilk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dropsilk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dropsilk_postgres_data:
